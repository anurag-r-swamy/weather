<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weather Station</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-4 md:p-8 flex flex-col items-center justify-center">

    <div class="max-w-4xl w-full bg-white p-6 md:p-8 rounded-2xl shadow-xl border border-slate-200">
        <header class="mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-100 pb-4 gap-4">
            <div>
                <h1 class="text-2xl font-black text-slate-900 tracking-wide">LIVE WEATHER STATION</h1>
                <p class="text-xs text-slate-500 font-medium">Custom Vercel App via ThingsBoard WS</p>
            </div>
            <span id="status" class="px-3 py-1 rounded-full text-xs font-bold bg-amber-100 text-amber-700 border border-amber-200 shadow-xs transition-all">
                Connecting...
            </span>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="md:col-span-1 grid grid-cols-2 gap-4">
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200/60 shadow-xs">
                    <span class="text-xs text-slate-500 font-bold uppercase block mb-1">Temperature</span>
                    <div class="flex items-baseline">
                        <span id="temperature" class="text-3xl font-black text-orange-600 tracking-tight">--</span>
                        <span class="text-xs font-bold text-slate-400 ml-0.5">°C</span>
                    </div>
                </div>
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200/60 shadow-xs">
                    <span class="text-xs text-slate-500 font-bold uppercase block mb-1">Humidity</span>
                    <div class="flex items-baseline">
                        <span id="humidity" class="text-3xl font-black text-blue-600 tracking-tight">--</span>
                        <span class="text-xs font-bold text-slate-400 ml-0.5">%</span>
                    </div>
                </div>
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200/60 shadow-xs">
                    <span class="text-xs text-slate-500 font-bold uppercase block mb-1">Pressure</span>
                    <div class="flex items-baseline">
                        <span id="pressure" class="text-2xl font-black text-emerald-600 tracking-tight">--</span>
                        <span class="text-xs font-bold text-slate-400 ml-0.5">hPa</span>
                    </div>
                </div>
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200/60 shadow-xs">
                    <span class="text-xs text-slate-500 font-bold uppercase block mb-1">Rainfall</span>
                    <div class="flex items-baseline">
                        <span id="rainfall" class="text-3xl font-black text-teal-600 tracking-tight">--</span>
                        <span class="text-xs font-bold text-slate-400 ml-0.5">mm</span>
                    </div>
                </div>
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200/60 shadow-xs col-span-2">
                    <span class="text-xs text-slate-500 font-bold uppercase block mb-1">Wind Direction</span>
                    <span id="direction" class="text-2xl font-black text-indigo-600 tracking-tight">--</span>
                </div>
            </div>

            <div class="md:col-span-2 bg-slate-50 p-5 rounded-xl border border-slate-200/60 shadow-xs flex flex-col">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-xs text-slate-500 font-bold uppercase block">Live Wind Speed Profile</span>
                    <div class="flex items-baseline">
                        <span id="windSpeedLabel" class="text-xl font-black text-purple-600 mr-0.5">--</span>
                        <span class="text-xs font-bold text-slate-400">m/s</span>
                    </div>
                </div>
                <div class="relative flex-1 min-h-[200px]">
                    <canvas id="windChart"></canvas>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- CREDENTIALS CONFIGURATION ---
        const TB_EMAIL = "rswamyanurag@gmail.com";
        const TB_PASSWORD = "Anurag@RVCE2027";
        const DEVICE_ID = "4efc1d00-4e33-11f1-aa03-0f0d95b4aecc"; 

        const statusBadge = document.getElementById('status');

        // --- WIND GRAPH SETUP ---
        const ctx = document.getElementById('windChart').getContext('2d');
        const windChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // Live Timestamps
                datasets: [{
                    label: 'Wind Speed (m/s)',
                    data: [],
                    borderColor: '#9333ea', // Purple line
                    backgroundColor: 'rgba(147, 51, 234, 0.06)',
                    borderWidth: 2.5,
                    pointRadius: 2,
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { 
                        grid: { display: false },
                        ticks: { color: '#64748b', font: { size: 10 } }
                    },
                    y: { 
                        grid: { color: '#e2e8f0' },
                        ticks: { color: '#64748b', font: { size: 10 } },
                        beginAtZero: true
                    }
                },
                plugins: {
                    legend: { display: false } // Hidden because header handles labeling elegantly
                }
            }
        });

        // --- THINGSBOARD WEBSOCKET INTEGRATION ---
        async function initDashboard() {
            try {
                // 1. Authenticate to get JWT token
                const authRes = await fetch('https://mqtt.eu.thingsboard.cloud/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: TB_EMAIL, password: TB_PASSWORD })
                });
                
                if (!authRes.ok) throw new Error("Authentication failed");
                const authData = await authRes.json();
                const token = authData.token;

                // 2. Open WebSocket link
                const ws = new WebSocket(`wss://mqtt.eu.thingsboard.cloud/api/ws/plugins/telemetry?token=${token}`);

                ws.onopen = () => {
                    statusBadge.textContent = "Live Stream Connected";
                    statusBadge.className = "px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700 border border-green-200 shadow-xs";

                    // 3. Subscribe specifically to your ESP32's latest telemetry keys
                    const subCommand = {
                        tsSubCmds: [
                            {
                                entityType: "DEVICE",
                                entityId: DEVICE_ID,
                                scope: "LATEST_TELEMETRY",
                                cmdId: 1
                            }
                        ]
                    };
                    ws.send(JSON.stringify(subCommand));
                };

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    
                    if (data.data) {
                        const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

                        for (const [key, valueArray] of Object.entries(data.data)) {
                            const latestValue = valueArray[valueArray.length - 1][1];
                            const element = document.getElementById(key);
                            
                            // Handle standard labels text injection
                            if (element) {
                                if (!isNaN(latestValue) && key !== 'direction') {
                                    element.textContent = parseFloat(latestValue).toFixed(1);
                                } else {
                                    element.textContent = latestValue;
                                }
                            }

                            // Dynamic Update for the Wind Speed Graph Mapping
                            if (key === 'windSpeed') {
                                const numericWind = parseFloat(latestValue);
                                
                                // Update numeric indicator next to graph header
                                document.getElementById('windSpeedLabel').textContent = numericWind.toFixed(1);

                                // Maintain moving historical graph window (limit to 12 data frames)
                                if (windChart.data.labels.length > 12) {
                                    windChart.data.labels.shift();
                                    windChart.data.datasets[0].data.shift();
                                }
                                
                                windChart.data.labels.push(now);
                                windChart.data.datasets[0].data.push(numericWind);
                                windChart.data.update();
                            }
                        }
                    }
                };

                ws.onclose = () => {
                    statusBadge.textContent = "Reconnecting...";
                    statusBadge.className = "px-3 py-1 rounded-full text-xs font-bold bg-red-100 text-red-700 border border-red-200 shadow-xs";
                    setTimeout(initDashboard, 5000); 
                };

            } catch (err) {
                console.error(err);
                statusBadge.textContent = "Connection Error";
                statusBadge.className = "px-3 py-1 rounded-full text-xs font-bold bg-red-100 text-red-700 border border-red-200 shadow-xs";
            }
        }

        initDashboard();
    </script>
</body>
</html>
