<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Weather Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-4 md:p-6 flex flex-col items-center">

    <div class="max-w-5xl w-full bg-white p-6 rounded-2xl shadow-xl border border-slate-200">
        <header class="mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-100 pb-4 gap-4">
            <div>
                <h1 class="text-2xl font-black text-slate-900 tracking-wide">HYBRID METEOROLOGICAL STATION</h1>
                <p id="debug-log" class="text-xs text-slate-500 font-mono mt-1">Status: Checking System Pipelines...</p>
            </div>
            <span id="status" class="px-3 py-1 rounded-full text-xs font-bold bg-amber-100 text-amber-700 border border-amber-200 shadow-xs">
                Connecting...
            </span>
        </header>
        
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200/70 shadow-xs">
                <span class="text-xs text-slate-400 font-bold uppercase block mb-1">Temperature</span>
                <div class="flex items-baseline"><span id="temperature" class="text-3xl font-black text-orange-600">--</span><span class="text-xs font-bold text-slate-400 ml-0.5">°C</span></div>
            </div>
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200/70 shadow-xs">
                <span class="text-xs text-slate-400 font-bold uppercase block mb-1">Humidity</span>
                <div class="flex items-baseline"><span id="humidity" class="text-3xl font-black text-blue-600">--</span><span class="text-xs font-bold text-slate-400 ml-0.5">%</span></div>
            </div>
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200/70 shadow-xs">
                <span class="text-xs text-slate-400 font-bold uppercase block mb-1">Atm. Pressure</span>
                <div class="flex items-baseline"><span id="pressure" class="text-2xl font-black text-emerald-600">--</span><span class="text-xs font-bold text-slate-400 ml-0.5">hPa</span></div>
            </div>
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200/70 shadow-xs col-span-2">
                <span class="text-xs text-slate-400 font-bold uppercase block mb-1">Current Wind Track</span>
                <span id="direction" class="text-xl font-black text-indigo-600 truncate block">--</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200/70 flex flex-col h-[300px]">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs text-slate-500 font-bold uppercase">Wind Velocity Profile</span>
                    <span class="text-sm font-black text-purple-600"><span id="windSpeedLabel">0.0</span> m/s</span>
                </div>
                <div class="flex-1 min-h-0 w-full relative"><canvas id="windChart"></canvas></div>
            </div>
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200/70 flex flex-col h-[300px]">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs text-slate-500 font-bold uppercase">Precipitation Log (12-Hr Loop)</span>
                    <span class="text-sm font-black text-teal-600"><span id="rainfallLabel">0.00</span> mm</span>
                </div>
                <div class="flex-1 min-h-0 w-full relative"><canvas id="rainChart"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        // --- REFRESH NETWORK INFRASTRUCTURE CONFIGURATION ---
        const LOCAL_ESP32_IP = "192.168.1.50"; // Adjust to your exact local board IP address
        const MAX_STORAGE_POINTS = 60;          // Limits rendering scope viewport size

        const statusBadge = document.getElementById('status');
        const debugLog = document.getElementById('debug-log');

        // Determine working mode environment context
        // If loaded from "localhost" or Vercel, run cloud tracking mode. If opened as a local file, switch to direct hardware fallback mode.
        const isLocalFileMode = window.location.protocol === 'file:';

        // --- CHART OBJECT BUILD DECLARATIONS ---
        const windChart = new Chart(document.getElementById('windChart').getContext('2d'), {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Wind Speed', data: [], borderColor: '#9333ea', backgroundColor: 'rgba(147, 51, 234, 0.05)', borderWidth: 2, pointRadius: 1, tension: 0.3, fill: true }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        const rainChart = new Chart(document.getElementById('rainChart').getContext('2d'), {
            type: 'bar',
            data: { labels: [], datasets: [{ label: 'Rainfall', data: [], backgroundColor: '#0d9488', borderRadius: 4 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        // --- REPEATING POLLING REFRESH LOOP ENGINE (1Hz Frequency) ---
        async function runDataSynchronizationPipeline() {
            let fetchTargetURL = "";
            let communicationModeText = "";

            if (isLocalFileMode) {
                fetchTargetURL = `http://${LOCAL_ESP32_IP}/api/live`;
                communicationModeText = "Offline Fallback Mode";
            } else {
                fetchTargetURL = `${window.location.origin}/api/telemetry`;
                communicationModeText = "Vercel Secure Cloud Mode";
            }

            try {
                const res = await fetch(fetchTargetURL, { signal: AbortSignal.timeout(900) });
                if (!res.ok) throw new Error(`HTTP System Fault Status: ${res.status}`);
                
                const data = await res.json();
                const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

                // Update visual tracking layout components
                statusBadge.textContent = communicationModeText;
                statusBadge.className = isLocalFileMode 
                    ? "px-3 py-1 rounded-full text-xs font-bold bg-blue-100 text-blue-700 border border-blue-200"
                    : "px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700 border border-green-200";

                ['temperature', 'humidity', 'pressure', 'direction'].forEach(key => {
                    const el = document.getElementById(key);
                    if (el && data[key] !== undefined) {
                        el.textContent = (typeof data[key] === 'number') ? data[key].toFixed(1) : data[key];
                    }
                });

                const wSpeed = data.windSpeed !== undefined ? data.windSpeed : 0;
                const rVolume = data.rainfall !== undefined ? data.rainfall : 0;

                document.getElementById('windSpeedLabel').textContent = wSpeed.toFixed(1);
                document.getElementById('rainfallLabel').textContent = rVolume.toFixed(2);

                // Chart Array Mapping Engine Transformations
                if (!isLocalFileMode && data.history && data.history.length > 0) {
                    // Sync up with history arrays from the cloud
                    windChart.data.labels = data.history.map(h => h.time);
                    windChart.data.datasets[0].data = data.history.map(h => h.wind);
                    
                    rainChart.data.labels = data.history.map(h => h.time);
                    rainChart.data.datasets[0].data = data.history.map(h => h.rain);
                } else {
                    // Direct rolling fallback tracking strategy
                    if (windChart.data.labels.length > MAX_STORAGE_POINTS) {
                        windChart.data.labels.shift(); windChart.data.datasets[0].data.shift();
                        rainChart.data.labels.shift(); rainChart.data.datasets[0].data.shift();
                    }
                    windChart.data.labels.push(now);
                    windChart.data.datasets[0].data.push(wSpeed);
                    
                    rainChart.data.labels.push(now);
                    rainChart.data.datasets[0].data.push(rVolume);
                }

                windChart.update();
                rainChart.update();
                debugLog.textContent = `Sync sequence complete at 1Hz frequency marker: ${now}`;

            } catch (err) {
                statusBadge.textContent = "Data Link Fault";
                statusBadge.className = "px-3 py-1 rounded-full text-xs font-bold bg-red-100 text-red-700 border border-red-200";
                debugLog.textContent = `Error details: ${err.message}. Ensure device parameters are mapped correctly.`;
            }
        }

        // Run interval processes at exactly 1000 milliseconds (1 Second)
        setInterval(runDataSynchronizationPipeline, 1000);
        runDataSynchronizationPipeline();
    </script>
</body>
</html>
